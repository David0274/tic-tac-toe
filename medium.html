<html>
    <head>
        <title>computer tic tac toe</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div id="flash"></div>
        <div id="wasted" aria-hidden="true"><img id="wimg" src="hqdefault.jpg" alt="wasted img"></div>
<div>

        <img src="thunder1.png" class="thunder">    
                <img src="thunder2.png" class="thunder">
                        <img src="thunder3.png" class="thunder">     
        </div>   
        <img src="Tie_1.png" alt="" class="tiebottom tieimg">
                <img src="tie_2.png" alt="" class="tieright tieimg">

        <div class="gain">

            <div class="game" id="game">

            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
            </div>
        </div>
        <div id="status"></div>
        <button id="restartbtun">restart</button>
        <br>
        <br>
        <button class="backbutton" onclick="location.href='index.html'">back to homes</button>
        <audio id="winsound" src="yeah-boiii-i-i-i.mp3"></audio>
        <audio id="losesound" src="emotion-pokemon-bw.mp3"></audio>
<script src=" https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
